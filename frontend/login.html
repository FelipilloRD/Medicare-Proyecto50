<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Clínica MediCare - Login & Registro">
  <title>✦ Clínica MediCare - Acceso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Login-specific styles */
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-md);
    }
    
    .login-card {
      background: var(--bg-card);
      border: 1px solid rgba(59, 130, 246, 0.2);
      border-radius: var(--radius-xl);
      padding: var(--spacing-xl);
      max-width: 450px;
      width: 100%;
      box-shadow: var(--shadow-xl);
      backdrop-filter: blur(10px);
      animation: fadeInUp 0.6s ease-out;
    }
    
    .login-header {
      text-align: center;
      margin-bottom: var(--spacing-lg);
    }
    
    .login-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: var(--spacing-md);
    }
    
    .login-logo-icon {
      color: var(--accent-blue);
      display: flex;
      align-items: center;
      justify-content: center;
      filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.5));
      animation: pulse 3s ease-in-out infinite;
    }
    
    .login-logo-icon svg {
      width: 48px;
      height: 48px;
      color: var(--accent-blue);
    }
    
    .login-logo-text {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }
    
    .login-title {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: var(--spacing-xs);
    }
    
    .login-subtitle {
      color: var(--text-secondary);
      font-size: 0.95rem;
    }
    
    /* Tabs */
    .auth-tabs {
      display: flex;
      gap: var(--spacing-sm);
      margin-bottom: var(--spacing-lg);
      border-bottom: 2px solid rgba(59, 130, 246, 0.1);
    }
    
    .auth-tab {
      flex: 1;
      padding: var(--spacing-sm) var(--spacing-md);
      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all var(--transition-fast);
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
    }
    
    .auth-tab:hover {
      color: var(--text-primary);
    }
    
    .auth-tab.active {
      color: var(--accent-blue);
      border-bottom-color: var(--accent-blue);
    }
    
    .auth-form {
      display: none;
    }
    
    .auth-form.active {
      display: block;
    }
    
    .login-form .form-group {
      margin-bottom: var(--spacing-md);
    }
    
    .login-form label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--text-secondary);
      font-weight: 600;
      font-size: 0.875rem;
    }
    
    .login-form input {
      width: 100%;
      background: var(--bg-tertiary);
      border: 2px solid rgba(59, 130, 246, 0.2);
      color: var(--text-primary);
      padding: 0.875rem 1rem;
      border-radius: var(--radius-md);
      font-family: var(--font-body);
      font-size: 1rem;
      transition: all var(--transition-fast);
    }
    
    .login-form input:focus {
      outline: none;
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
      background: var(--bg-secondary);
    }
    
    .login-form input::placeholder {
      color: var(--text-muted);
    }
    
    .login-error, .login-success {
      padding: var(--spacing-sm);
      border-radius: var(--radius-sm);
      margin-bottom: var(--spacing-md);
      font-size: 0.9rem;
      display: none;
      animation: slideIn 0.3s ease-out;
    }
    
    .login-error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: var(--error);
    }
    
    .login-success {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #22c55e;
    }
    
    .login-error.show, .login-success.show {
      display: block;
    }
    
    .login-btn {
      width: 100%;
      margin-top: var(--spacing-md);
    }
    
    .password-requirements {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
      line-height: 1.4;
    }
    
    .login-footer {
      text-align: center;
      margin-top: var(--spacing-lg);
      padding-top: var(--spacing-lg);
      border-top: 1px solid rgba(59, 130, 246, 0.1);
      color: var(--text-muted);
      font-size: 0.875rem;
    }
    
    .back-home {
      display: inline-block;
      margin-top: var(--spacing-md);
      color: var(--accent-blue);
      text-decoration: none;
      font-weight: 600;
      transition: all var(--transition-fast);
    }
    
    .back-home:hover {
      color: var(--accent-purple);
    }
    
    .lang-selector-login {
      position: absolute;
      top: var(--spacing-md);
      right: var(--spacing-md);
      background: var(--bg-tertiary);
      color: var(--text-primary);
      border: 1px solid rgba(79, 143, 255, 0.3);
      padding: var(--spacing-xs) var(--spacing-sm);
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      cursor: pointer;
      transition: all var(--transition-fast);
    }
    
    .lang-selector-login:hover {
      border-color: var(--accent-blue);
    }
    
    @media (max-width: 768px) {
      .login-card {
        padding: var(--spacing-lg);
      }
      
      .login-logo-text {
        font-size: 1.5rem;
      }
      
      .login-title {
        font-size: 1.25rem;
      }
      
      .lang-selector-login {
        position: fixed;
        top: var(--spacing-sm);
        right: var(--spacing-sm);
        z-index: 9999;
      }
    }
  </style>
</head>
<body>
  <!-- Language Selector -->
  <select id="lang-selector" class="lang-selector-login">
    <option value="es">🇪🇸 ES</option>
    <option value="en">🇺🇸 EN</option>
    <option value="fr">🇫🇷 FR</option>
    <option value="pt">🇧🇷 PT</option>
    <option value="de">🇩🇪 DE</option>
  </select>

  <!-- Login Container -->
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">
          <div class="login-logo-icon">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="18" y="8" width="12" height="32" rx="2" fill="currentColor"/>
              <rect x="8" y="18" width="32" height="12" rx="2" fill="currentColor"/>
              <circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="2" fill="none"/>
            </svg>
          </div>
          <span class="login-logo-text">Clínica MediCare</span>
        </div>
        <h1 class="login-title">Bienvenido</h1>
        <p class="login-subtitle">Inicia sesión o crea una cuenta</p>
      </div>
      
      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Iniciar Sesión</button>
        <button class="auth-tab" data-tab="register">Registrarse</button>
      </div>
      
      <div id="login-error" class="login-error"></div>
      <div id="login-success" class="login-success"></div>
      
      <!-- Login Form -->
      <form id="login-form" class="login-form auth-form active">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input 
            type="email" 
            id="login-email" 
            name="email" 
            required 
            autocomplete="email"
            placeholder="tu@email.com"
          >
        </div>
        
        <div class="form-group">
          <label for="login-password">Contraseña</label>
          <input 
            type="password" 
            id="login-password" 
            name="password" 
            required 
            autocomplete="current-password"
            placeholder="••••••••"
          >
        </div>
        
        <button type="submit" class="btn btn-primary login-btn" id="login-btn">
          Iniciar Sesión
        </button>
      </form>
      
      <!-- Register Form -->
      <form id="register-form" class="login-form auth-form">
        <div class="form-group">
          <label for="register-name">Nombre Completo (Opcional)</label>
          <input 
            type="text" 
            id="register-name" 
            name="name" 
            autocomplete="name"
            placeholder="Juan Pérez"
          >
        </div>
        
        <div class="form-group">
          <label for="register-email">Email</label>
          <input 
            type="email" 
            id="register-email" 
            name="email" 
            required 
            autocomplete="email"
            placeholder="tu@email.com"
          >
        </div>
        
        <div class="form-group">
          <label for="register-password">Contraseña</label>
          <input 
            type="password" 
            id="register-password" 
            name="password" 
            required 
            autocomplete="new-password"
            placeholder="••••••••"
            minlength="8"
          >
          <div class="password-requirements">
            Mínimo 8 caracteres
          </div>
        </div>
        
        <div class="form-group">
          <label for="register-password-confirm">Confirmar Contraseña</label>
          <input 
            type="password" 
            id="register-password-confirm" 
            name="password-confirm" 
            required 
            autocomplete="new-password"
            placeholder="••••••••"
            minlength="8"
          >
        </div>
        
        <button type="submit" class="btn btn-primary login-btn" id="register-btn">
          Crear Cuenta
        </button>
      </form>
      
      <div class="login-footer">
        <a href="/" class="back-home">← Volver al inicio</a>
        <p style="margin-top: var(--spacing-md);">
          Sistema de Citas Médicas Profesional<br>
          © 2026 Clínica MediCare
        </p>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="i18n.js"></script>
  <script>
    // Initialize language selector
    const langSelector = document.getElementById('lang-selector');
    if (langSelector) {
      langSelector.value = window.i18n.getCurrentLanguage();
      
      langSelector.addEventListener('change', (e) => {
        const newLang = e.target.value;
        window.i18n.setLanguage(newLang);
      });
    }
    
    // Tab switching
    const tabs = document.querySelectorAll('.auth-tab');
    const forms = document.querySelectorAll('.auth-form');
    
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const targetTab = tab.dataset.tab;
        
        // Update tabs
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        
        // Update forms
        forms.forEach(f => f.classList.remove('active'));
        document.getElementById(`${targetTab}-form`).classList.add('active');
        
        // Clear messages
        hideError();
        hideSuccess();
      });
    });
    
    // Handle login form submission
    const loginForm = document.getElementById('login-form');
    const loginBtn = document.getElementById('login-btn');
    
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      
      if (!email || !password) {
        showError('Por favor completa todos los campos');
        return;
      }
      
      try {
        loginBtn.disabled = true;
        loginBtn.textContent = 'Iniciando sesión...';
        hideError();
        hideSuccess();
        
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          credentials: 'include',
          body: JSON.stringify({ username: email, password })
        });
        
        const data = await response.json();
        
        if (!response.ok) {
          throw new Error(data.message || 'Error al iniciar sesión');
        }
        
        sessionStorage.setItem('user', JSON.stringify(data.user));
        showSuccess('¡Inicio de sesión exitoso! Redirigiendo...');
        
        setTimeout(() => {
          window.location.href = '/';
        }, 1000);
        
      } catch (error) {
        console.error('Login error:', error);
        showError(error.message);
        loginBtn.disabled = false;
        loginBtn.textContent = 'Iniciar Sesión';
      }
    });
    
    // Handle register form submission
    const registerForm = document.getElementById('register-form');
    const registerBtn = document.getElementById('register-btn');
    
    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const name = document.getElementById('register-name').value.trim();
      const email = document.getElementById('register-email').value.trim();
      const password = document.getElementById('register-password').value;
      const passwordConfirm = document.getElementById('register-password-confirm').value;
      
      if (!email || !password || !passwordConfirm) {
        showError('Por favor completa todos los campos requeridos');
        return;
      }
      
      if (password !== passwordConfirm) {
        showError('Las contraseñas no coinciden');
        return;
      }
      
      if (password.length < 8) {
        showError('La contraseña debe tener al menos 8 caracteres');
        return;
      }
      
      try {
        registerBtn.disabled = true;
        registerBtn.textContent = 'Creando cuenta...';
        hideError();
        hideSuccess();
        
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          credentials: 'include',
          body: JSON.stringify({ email, password, name })
        });
        
        const data = await response.json();
        
        if (!response.ok) {
          throw new Error(data.message || 'Error al crear la cuenta');
        }
        
        sessionStorage.setItem('user', JSON.stringify(data.user));
        showSuccess('¡Cuenta creada exitosamente! Redirigiendo...');
        
        setTimeout(() => {
          window.location.href = '/';
        }, 1500);
        
      } catch (error) {
        console.error('Register error:', error);
        showError(error.message);
        registerBtn.disabled = false;
        registerBtn.textContent = 'Crear Cuenta';
      }
    });
    
    function showError(message) {
      const errorDiv = document.getElementById('login-error');
      errorDiv.textContent = message;
      errorDiv.classList.add('show');
    }
    
    function hideError() {
      document.getElementById('login-error').classList.remove('show');
    }
    
    function showSuccess(message) {
      const successDiv = document.getElementById('login-success');
      successDiv.textContent = message;
      successDiv.classList.add('show');
    }
    
    function hideSuccess() {
      document.getElementById('login-success').classList.remove('show');
    }
  </script>
</body>
</html>
