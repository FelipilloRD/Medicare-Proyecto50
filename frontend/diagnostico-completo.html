<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnóstico Login - MediCare AI</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #1a1a1a; color: #fff; }
        .test { margin: 10px 0; padding: 10px; border: 1px solid #333; border-radius: 5px; }
        .success { background: #0f4f0f; border-color: #0f8f0f; }
        .error { background: #4f0f0f; border-color: #8f0f0f; }
        .info { background: #0f0f4f; border-color: #0f0f8f; }
        button { padding: 10px 20px; margin: 5px; background: #3b82f6; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #2563eb; }
        pre { background: #2a2a2a; padding: 10px; border-radius: 5px; overflow-x: auto; }
        input { padding: 8px; margin: 5px; border: 1px solid #555; background: #333; color: #fff; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>🔍 Diagnóstico Completo - Login MediCare AI</h1>
    
    <div class="test info">
        <h3>📋 Información del Sistema</h3>
        <p><strong>URL actual:</strong> <span id="current-url"></span></p>
        <p><strong>User Agent:</strong> <span id="user-agent"></span></p>
        <p><strong>Protocolo:</strong> <span id="protocol"></span></p>
    </div>

    <div class="test">
        <h3>🌐 Test 1: Conectividad del Servidor</h3>
        <button onclick="testServerHealth()">Probar Servidor</button>
        <div id="server-result"></div>
    </div>

    <div class="test">
        <h3>🔐 Test 2: API de Login (Directo)</h3>
        <button onclick="testLoginAPI()">Probar API Login</button>
        <div id="login-api-result"></div>
    </div>

    <div class="test">
        <h3>📝 Test 3: Login con Formulario</h3>
        <input type="text" id="test-username" placeholder="Usuario" value="admin">
        <input type="password" id="test-password" placeholder="Contraseña" value="admin123">
        <button onclick="testFormLogin()">Login con Formulario</button>
        <div id="form-login-result"></div>
    </div>

    <div class="test">
        <h3>🍪 Test 4: Cookies y Sesión</h3>
        <button onclick="testCookies()">Verificar Cookies</button>
        <div id="cookies-result"></div>
    </div>

    <div class="test">
        <h3>🔄 Test 5: CORS y Headers</h3>
        <button onclick="testCORS()">Probar CORS</button>
        <div id="cors-result"></div>
    </div>

    <div class="test">
        <h3>📊 Logs del Navegador</h3>
        <div id="console-logs"></div>
    </div>

    <script>
        // Capturar logs del navegador
        const originalLog = console.log;
        const originalError = console.error;
        const logs = [];

        console.log = function(...args) {
            logs.push({type: 'log', message: args.join(' '), time: new Date().toISOString()});
            originalLog.apply(console, args);
            updateConsoleLogs();
        };

        console.error = function(...args) {
            logs.push({type: 'error', message: args.join(' '), time: new Date().toISOString()});
            originalError.apply(console, args);
            updateConsoleLogs();
        };

        function updateConsoleLogs() {
            const logsDiv = document.getElementById('console-logs');
            logsDiv.innerHTML = logs.map(log => 
                `<div style="color: ${log.type === 'error' ? '#ff6b6b' : '#4ecdc4'}">
                    [${log.time.split('T')[1].split('.')[0]}] ${log.type.toUpperCase()}: ${log.message}
                </div>`
            ).join('');
        }

        // Información del sistema
        document.getElementById('current-url').textContent = window.location.href;
        document.getElementById('user-agent').textContent = navigator.userAgent;
        document.getElementById('protocol').textContent = window.location.protocol;

        // Test 1: Servidor
        async function testServerHealth() {
            const result = document.getElementById('server-result');
            result.innerHTML = '<p>🔄 Probando servidor...</p>';
            
            try {
                const response = await fetch('/health');
                const data = await response.json();
                
                result.innerHTML = `
                    <div class="success">
                        <p>✅ Servidor funcionando</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                result.innerHTML = `
                    <div class="error">
                        <p>❌ Error de servidor: ${error.message}</p>
                    </div>
                `;
            }
        }

        // Test 2: API Login
        async function testLoginAPI() {
            const result = document.getElementById('login-api-result');
            result.innerHTML = '<p>🔄 Probando API de login...</p>';
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({
                        username: 'admin',
                        password: 'admin123'
                    })
                });

                console.log('Response status:', response.status);
                console.log('Response headers:', Object.fromEntries(response.headers.entries()));

                const text = await response.text();
                console.log('Response text:', text);

                let data = {};
                if (text) {
                    try {
                        data = JSON.parse(text);
                    } catch (parseError) {
                        throw new Error(`JSON parse error: ${parseError.message}. Response: ${text}`);
                    }
                }

                if (response.ok) {
                    result.innerHTML = `
                        <div class="success">
                            <p>✅ API Login exitoso</p>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </div>
                    `;
                } else {
                    result.innerHTML = `
                        <div class="error">
                            <p>❌ API Login falló (${response.status})</p>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </div>
                    `;
                }
            } catch (error) {
                result.innerHTML = `
                    <div class="error">
                        <p>❌ Error en API Login: ${error.message}</p>
                    </div>
                `;
            }
        }

        // Test 3: Formulario
        async function testFormLogin() {
            const result = document.getElementById('form-login-result');
            const username = document.getElementById('test-username').value;
            const password = document.getElementById('test-password').value;
            
            result.innerHTML = '<p>🔄 Probando login con formulario...</p>';
            
            try {
                // Simular exactamente lo que hace el formulario original
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({ username, password })
                });

                const text = await response.text();
                let data = {};
                
                if (text) {
                    try {
                        data = JSON.parse(text);
                    } catch (parseError) {
                        throw new Error(`Respuesta inválida del servidor (${response.status})`);
                    }
                } else {
                    throw new Error(`El servidor no respondió correctamente (${response.status})`);
                }
                
                if (!response.ok) {
                    throw new Error(data.message || data.error || 'Error al iniciar sesión');
                }
                
                // Simular almacenamiento en sessionStorage
                sessionStorage.setItem('user', JSON.stringify(data.user));
                
                result.innerHTML = `
                    <div class="success">
                        <p>✅ Login con formulario exitoso</p>
                        <p>🔄 Redirigiendo a /...</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
                
                // Simular redirección (comentado para no salir de la página de diagnóstico)
                // window.location.href = '/';
                
            } catch (error) {
                result.innerHTML = `
                    <div class="error">
                        <p>❌ Error en formulario: ${error.message}</p>
                    </div>
                `;
            }
        }

        // Test 4: Cookies
        function testCookies() {
            const result = document.getElementById('cookies-result');
            
            const cookies = document.cookie;
            const sessionStorage = JSON.stringify(window.sessionStorage);
            const localStorage = JSON.stringify(window.localStorage);
            
            result.innerHTML = `
                <div class="info">
                    <p><strong>Cookies:</strong></p>
                    <pre>${cookies || 'No hay cookies'}</pre>
                    <p><strong>SessionStorage:</strong></p>
                    <pre>${sessionStorage}</pre>
                    <p><strong>LocalStorage:</strong></p>
                    <pre>${localStorage}</pre>
                </div>
            `;
        }

        // Test 5: CORS
        async function testCORS() {
            const result = document.getElementById('cors-result');
            result.innerHTML = '<p>🔄 Probando CORS...</p>';
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'OPTIONS'
                });
                
                const headers = Object.fromEntries(response.headers.entries());
                
                result.innerHTML = `
                    <div class="info">
                        <p>✅ CORS Headers:</p>
                        <pre>${JSON.stringify(headers, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                result.innerHTML = `
                    <div class="error">
                        <p>❌ Error CORS: ${error.message}</p>
                    </div>
                `;
            }
        }

        // Ejecutar algunos tests automáticamente
        window.addEventListener('load', () => {
            console.log('🔍 Página de diagnóstico cargada');
            testCookies();
        });
    </script>
</body>
</html>
