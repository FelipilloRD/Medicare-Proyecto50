<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Login - MediCare</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        .test-result { margin: 10px 0; padding: 10px; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; margin: 5px; }
        button:hover { background: #0056b3; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 4px; overflow-x: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Debug Login - MediCare AI</h1>
        <p>Esta página diagnostica problemas de login en localhost:3002</p>
        
        <div id="results"></div>
        
        <button onclick="testAPI()">🧪 Test API Login</button>
        <button onclick="testFetch()">🌐 Test Fetch Function</button>
        <button onclick="testCORS()">🔒 Test CORS</button>
        <button onclick="clearResults()">🗑️ Limpiar</button>
        
        <h3>Login Manual:</h3>
        <form id="debug-form">
            <input type="text" id="username" placeholder="Usuario" value="admin" style="margin: 5px; padding: 8px;">
            <input type="password" id="password" placeholder="Contraseña" value="admin123" style="margin: 5px; padding: 8px;">
            <button type="submit">🚀 Login</button>
        </form>
    </div>

    <script>
        const results = document.getElementById('results');
        
        function addResult(type, title, content) {
            const div = document.createElement('div');
            div.className = `test-result ${type}`;
            div.innerHTML = `<strong>${title}</strong><br>${content}`;
            results.appendChild(div);
        }
        
        function clearResults() {
            results.innerHTML = '';
        }
        
        async function testFetch() {
            try {
                addResult('info', '🧪 Testing Fetch Function', 'Verificando si fetch está disponible...');
                
                if (typeof fetch === 'undefined') {
                    addResult('error', '❌ Fetch No Disponible', 'La función fetch no está disponible en este navegador');
                    return;
                }
                
                addResult('success', '✅ Fetch Disponible', 'La función fetch está disponible');
                
                // Test simple fetch
                const response = await fetch('/health');
                addResult('success', '✅ Fetch Funciona', `Status: ${response.status}, URL: ${response.url}`);
                
            } catch (error) {
                addResult('error', '❌ Error en Fetch', error.message);
            }
        }
        
        async function testCORS() {
            try {
                addResult('info', '🔒 Testing CORS', 'Verificando configuración CORS...');
                
                const response = await fetch('/api/auth/me', {
                    method: 'GET',
                    credentials: 'include'
                });
                
                addResult('info', '📊 CORS Response', `Status: ${response.status}<br>Headers: ${JSON.stringify(Object.fromEntries(response.headers.entries()), null, 2)}`);
                
            } catch (error) {
                addResult('error', '❌ Error CORS', error.message);
            }
        }
        
        async function testAPI() {
            try {
                addResult('info', '🧪 Testing API Login', 'Enviando request a /api/auth/login...');
                
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({
                        username: 'admin',
                        password: 'admin123'
                    })
                });
                
                addResult('info', '📊 Response Info', `Status: ${response.status}<br>OK: ${response.ok}<br>URL: ${response.url}`);
                
                const text = await response.text();
                addResult('info', '📄 Response Text', `<pre>${text}</pre>`);
                
                if (text) {
                    try {
                        const data = JSON.parse(text);
                        if (data.success) {
                            addResult('success', '✅ Login Exitoso', `Usuario: ${data.user.username}<br>Role: ${data.user.role}`);
                        } else {
                            addResult('error', '❌ Login Fallido', data.message || 'Error desconocido');
                        }
                    } catch (parseError) {
                        addResult('error', '❌ JSON Parse Error', parseError.message);
                    }
                } else {
                    addResult('error', '❌ Respuesta Vacía', 'El servidor no devolvió contenido');
                }
                
            } catch (error) {
                addResult('error', '❌ Fetch Error', `${error.name}: ${error.message}`);
                console.error('Full error:', error);
            }
        }
        
        // Form handler
        document.getElementById('debug-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                addResult('info', '🚀 Manual Login', `Intentando login con: ${username}`);
                
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({ username, password })
                });
                
                const text = await response.text();
                let data = {};
                
                if (text) {
                    try {
                        data = JSON.parse(text);
                    } catch (parseError) {
                        addResult('error', '❌ Parse Error', parseError.message);
                        return;
                    }
                } else {
                    addResult('error', '❌ Respuesta Vacía', 'El servidor no respondió');
                    return;
                }
                
                if (!response.ok) {
                    addResult('error', '❌ Login Error', data.message || data.error || 'Error desconocido');
                    return;
                }
                
                addResult('success', '✅ Login Exitoso!', `Bienvenido ${data.user.username}! Redirigiendo...`);
                
                // Simulate redirect
                setTimeout(() => {
                    window.location.href = '/';
                }, 2000);
                
            } catch (error) {
                addResult('error', '❌ Error Fatal', `${error.name}: ${error.message}`);
                console.error('Login error:', error);
            }
        });
        
        // Auto-run basic tests
        window.addEventListener('load', () => {
            addResult('info', '🏁 Página Cargada', 'Ejecutando tests automáticos...');
            testFetch();
        });
    </script>
</body>
</html>
